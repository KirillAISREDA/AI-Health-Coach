worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логи
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Производительность
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json;

    # Безопасность
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    # Ограничение запросов (защита от флуда)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;

    # ── HTTP → HTTPS редирект ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + Telegram Webhook ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;   # ← замени на свой домен

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Webhook endpoint — только от Telegram IP
        location /webhook {
            # Telegram IP-диапазоны (актуальные на 2026)
            allow 149.154.160.0/20;
            allow 91.108.4.0/22;
            allow 91.108.8.0/22;
            allow 91.108.12.0/22;
            allow 91.108.16.0/22;
            allow 91.108.56.0/22;
            allow 95.161.64.0/20;
            allow 2001:67c:4e8::/48;
            deny all;

            limit_req zone=webhook burst=20 nodelay;

            proxy_pass         http://bot:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Telegram требует ответ < 60 секунд
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Healthcheck endpoint
        location /health {
            proxy_pass http://bot:8080/health;
            access_log off;
        }

        # Всё остальное — 404
        location / {
            return 404;
        }
    }
}
